name: Testes de Performance K6

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil de teste"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - spike
          - soak
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  k6:
    runs-on: ubuntu-22.04

    env:
      BASE_URL_TEST: ${{ secrets.BASE_URL_TEST || 'https://jsonplaceholder.typicode.com' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Instalar dependências
        run: npm install

      - name: Determinar perfil
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly run - executando load e soak"
            echo "profiles=load soak" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profiles=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "Push/PR - smoke"
            echo "profiles=smoke" >> $GITHUB_OUTPUT
          fi

      - name: Rodar testes de performance
        run: |
          for profile in ${{ steps.profile.outputs.profiles }}; do
            echo "Executando perfil: $profile"
            npx cross-env K6_TEST_TYPE=$profile npm run test:k6
          done

      - name: Upload relatórios (HTML + summary)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-reports-${{ github.run_number }}
          path: src/reports/
          retention-days: 14
          if-no-files-found: warn
